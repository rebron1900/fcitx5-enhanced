permissions:
  contents: write

name: Build & Release & Sync

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: malinskiy/action-android/install-sdk@0.1.7

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::No KEYSTORE_B64 secret set — APK will be unsigned"
            exit 0
          fi
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "$KEYSTORE_B64" | base64 -d > release.keystore
          $ANDROID_HOME/build-tools/*/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass env:KEY_PASS \
            --key-pass env:KEY_PASS \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$APK"
          echo "Signed: $APK"

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION=$(date +%Y%m%d)
          find app/build/outputs/apk/release -name '*.apk' -exec mv {} \
            "Fcitx5Enhanced-v${VERSION}.apk" \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fcitx5Enhanced
          path: Fcitx5Enhanced-*.apk
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Fcitx5Enhanced-*.apk

  sync:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Fetch release by tag
          curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" > /tmp/release.json

          NAME=$(jq -r '.name' /tmp/release.json)
          ASSET_URL=$(jq -r '.assets[0].browser_download_url' /tmp/release.json)
          ASSET_NAME=$(jq -r '.assets[0].name' /tmp/release.json)

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"

          echo "Release: $TAG — $NAME"
          echo "Asset: $ASSET_NAME"

          if [ "$ASSET_URL" = "null" ] || [ -z "$ASSET_URL" ]; then
            echo "::error::No APK asset found in release ${TAG}"
            exit 1
          fi

      - name: Download APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fSL \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ steps.info.outputs.asset_url }}" \
            -o "${{ steps.info.outputs.asset_name }}"
          ls -lh "${{ steps.info.outputs.asset_name }}"

      - name: Sync to Xposed repo
        env:
          XPOSED_PAT: ${{ secrets.XPOSED_PAT }}
        run: |
          XPOSED_REPO="Xposed-Modules-Repo/com.rebron1900.fcitx5enhanced"
          TAG="${{ steps.info.outputs.tag }}"

          # Delete all existing releases
          EXISTING=$(curl -sf \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${XPOSED_REPO}/releases")
          
          echo "$EXISTING" | jq -r '.[].id' | while read -r RID; do
            curl -sf -X DELETE \
              -H "Authorization: token ${XPOSED_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${XPOSED_REPO}/releases/${RID}"
            echo "Deleted release $RID"
          done

          # Delete all existing tags
          EXISTING_TAGS=$(curl -sf \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${XPOSED_REPO}/tags")
          
          echo "$EXISTING_TAGS" | jq -r '.[].name' | while read -r T; do
            curl -sf -X DELETE \
              -H "Authorization: token ${XPOSED_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${XPOSED_REPO}/git/refs/tags/${T}" 2>/dev/null || true
            echo "Deleted tag $T"
          done

          # Create new release
          BODY_JSON=$(jq -c '.body' /tmp/release.json)
          RELEASE_RESPONSE=$(curl -sf \
            -X POST \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${XPOSED_REPO}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"${{ steps.info.outputs.name }}\",
              \"body\": ${BODY_JSON},
              \"draft\": false,
              \"prerelease\": false
            }")

          NEW_RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
          echo "Created release: $NEW_RELEASE_ID"

          # Upload APK asset
          curl -sf \
            -X POST \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "https://uploads.github.com/repos/${XPOSED_REPO}/releases/${NEW_RELEASE_ID}/assets?name=${{ steps.info.outputs.asset_name }}" \
            --data-binary @${{ steps.info.outputs.asset_name }}

          echo "Sync complete: https://github.com/${XPOSED_REPO}/releases/tag/${TAG}"
