permissions:
  contents: write

name: Build & Release & Sync

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: malinskiy/action-android/install-sdk@0.1.7

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::No KEYSTORE_B64 secret set — APK will be unsigned"
            exit 0
          fi
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "$KEYSTORE_B64" | base64 -d > release.keystore
          $ANDROID_HOME/build-tools/*/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass env:KEY_PASS \
            --key-pass env:KEY_PASS \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$APK"
          echo "Signed: $APK"

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION=$(date +%Y%m%d)
          find app/build/outputs/apk/release -name '*.apk' -exec mv {} \
            "Fcitx5Enhanced-v${VERSION}.apk" \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fcitx5Enhanced
          path: Fcitx5Enhanced-*.apk
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Fcitx5Enhanced-*.apk

      - name: Sync to Xposed repo
        if: startsWith(github.ref, 'refs/tags/')
        env:
          XPOSED_PAT: ${{ secrets.XPOSED_PAT }}
        run: |
          if [ -z "$XPOSED_PAT" ]; then
            echo "::warning::No XPOSED_PAT set — skipping Xposed sync"
            exit 0
          fi

          XPOSED_REPO="Xposed-Modules-Repo/com.rebron1900.fcitx5enhanced"
          TAG="${GITHUB_REF_NAME}"
          APK=$(ls Fcitx5Enhanced-*.apk | head -1)

          echo "Syncing $TAG ($APK) to $XPOSED_REPO"

          # Delete existing releases
          EXISTING=$(curl -s \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${XPOSED_REPO}/releases") || true

          echo "$EXISTING" | jq -r '.[].id' 2>/dev/null | while read -r RID; do
            curl -s -X DELETE \
              -H "Authorization: token ${XPOSED_PAT}" \
              "https://api.github.com/repos/${XPOSED_REPO}/releases/${RID}" \
              && echo "Deleted release $RID" || echo "Failed to delete release $RID"
          done

          # Delete existing tags
          EXISTING_TAGS=$(curl -s \
            -H "Authorization: token ${XPOSED_PAT}" \
            "https://api.github.com/repos/${XPOSED_REPO}/tags") || true

          echo "$EXISTING_TAGS" | jq -r '.[].name' 2>/dev/null | while read -r T; do
            curl -s -X DELETE \
              -H "Authorization: token ${XPOSED_PAT}" \
              "https://api.github.com/repos/${XPOSED_REPO}/git/refs/tags/${T}" \
              && echo "Deleted tag $T" || echo "Failed to delete tag $T"
          done

          # Create release
          RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${XPOSED_REPO}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"${TAG}\",
              \"body\": \"## ${TAG}\n\nSee [main repo](https://github.com/rebron1900/fcitx5-enhanced/releases/tag/${TAG}) for details.\",
              \"draft\": false,
              \"prerelease\": false
            }")

          HTTP_CODE=$(echo "$RELEASE_RESPONSE" | tail -1)
          BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')
          NEW_RELEASE_ID=$(echo "$BODY" | jq -r '.id')

          echo "Create release: HTTP $HTTP_CODE, ID $NEW_RELEASE_ID"

          if [ "$HTTP_CODE" != "201" ] || [ "$NEW_RELEASE_ID" = "null" ]; then
            echo "::error::Failed to create release: $BODY"
            exit 1
          fi

          # Upload APK
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "https://uploads.github.com/repos/${XPOSED_REPO}/releases/${NEW_RELEASE_ID}/assets?name=${APK}" \
            --data-binary @${APK})

          UPLOAD_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          echo "Upload APK: HTTP $UPLOAD_CODE"

          if [ "$UPLOAD_CODE" != "201" ]; then
            echo "::error::Failed to upload APK: $(echo "$UPLOAD_RESPONSE" | sed '$d')"
            exit 1
          fi

          echo "Sync complete: https://github.com/${XPOSED_REPO}/releases/tag/${TAG}"
