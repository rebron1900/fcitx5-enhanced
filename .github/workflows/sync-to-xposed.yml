name: Sync to Xposed-Modules-Repo

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the release — use event payload if available, otherwise latest
          if [ -n "${{ github.event.release.url }}" ]; then
            curl -sf \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "${{ github.event.release.url }}" > /tmp/release.json
          else
            curl -sf \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" > /tmp/release.json
          fi

          # Extract scalar fields to GITHUB_OUTPUT
          TAG=$(jq -r '.tag_name' /tmp/release.json)
          NAME=$(jq -r '.name' /tmp/release.json)
          ASSET_URL=$(jq -r '.assets[0].browser_download_url' /tmp/release.json)
          ASSET_NAME=$(jq -r '.assets[0].name' /tmp/release.json)

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"

          echo "Release: $TAG — $NAME"

      - name: Download APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fSL \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ steps.info.outputs.asset_url }}" \
            -o "${{ steps.info.outputs.asset_name }}"
          ls -lh "${{ steps.info.outputs.asset_name }}"

      - name: Sync to Xposed repo
        env:
          XPOSED_PAT: ${{ secrets.XPOSED_PAT }}
        run: |
          XPOSED_REPO="Xposed-Modules-Repo/com.rebron1900.fcitx5enhanced"
          TAG="${{ steps.info.outputs.tag }}"

          # Delete all existing releases
          EXISTING=$(curl -sf \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${XPOSED_REPO}/releases")
          
          echo "$EXISTING" | jq -r '.[].id' | while read -r RID; do
            curl -sf -X DELETE \
              -H "Authorization: token ${XPOSED_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${XPOSED_REPO}/releases/${RID}"
            echo "Deleted release $RID"
          done

          # Delete all existing tags
          EXISTING_TAGS=$(curl -sf \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${XPOSED_REPO}/tags")
          
          echo "$EXISTING_TAGS" | jq -r '.[].name' | while read -r T; do
            curl -sf -X DELETE \
              -H "Authorization: token ${XPOSED_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${XPOSED_REPO}/git/refs/tags/${T}" 2>/dev/null || true
            echo "Deleted tag $T"
          done

          # Create new release with body from file (avoids $GITHUB_OUTPUT multi-line issues)
          BODY_JSON=$(jq -c '.body' /tmp/release.json)
          RELEASE_RESPONSE=$(curl -sf \
            -X POST \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${XPOSED_REPO}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"${{ steps.info.outputs.name }}\",
              \"body\": ${BODY_JSON},
              \"draft\": false,
              \"prerelease\": false
            }")

          NEW_RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
          echo "Created release: $NEW_RELEASE_ID"

          # Upload APK asset
          curl -sf \
            -X POST \
            -H "Authorization: token ${XPOSED_PAT}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "https://uploads.github.com/repos/${XPOSED_REPO}/releases/${NEW_RELEASE_ID}/assets?name=${{ steps.info.outputs.asset_name }}" \
            --data-binary @${{ steps.info.outputs.asset_name }}

          echo "Sync complete: https://github.com/${XPOSED_REPO}/releases/tag/${TAG}"
